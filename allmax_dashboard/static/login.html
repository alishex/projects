<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ALLMAX Dashboard — Kirish</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-emerald-950 flex items-center justify-center p-4">

<div class="absolute inset-0 overflow-hidden pointer-events-none">
  <div class="absolute -top-48 -right-48 w-96 h-96 bg-emerald-500 rounded-full opacity-10 blur-3xl"></div>
  <div class="absolute -bottom-48 -left-48 w-96 h-96 bg-blue-500 rounded-full opacity-10 blur-3xl"></div>
</div>

<div class="relative w-full max-w-md">
  <div class="bg-white rounded-3xl shadow-2xl p-8">

    <!-- Logo -->
    <div class="flex flex-col items-center mb-8">
      <div class="w-16 h-16 bg-gradient-to-br from-emerald-400 to-emerald-600 rounded-2xl flex items-center justify-center mb-4 shadow-lg shadow-emerald-200">
        <svg class="w-9 h-9 text-white" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.37 0 0 5.37 0 12s5.37 12 12 12 12-5.37 12-12S18.63 0 12 0zm5.89 8.22-1.97 9.28c-.15.66-.54.82-1.08.51l-3-2.21-1.45 1.39c-.16.16-.3.3-.6.3l.21-3.05 5.56-5.02c.24-.21-.05-.33-.37-.12L7.23 13.37l-2.94-.92c-.64-.2-.65-.64.14-.95l11.49-4.43c.54-.19 1.01.13.97.15z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-slate-900">ALLMAX Dashboard</h1>
      <p class="text-slate-500 text-sm mt-1">Telegram AI Agent nazorat paneli</p>
    </div>

    <!-- Error -->
    <div id="err" class="hidden mb-5 bg-red-50 border border-red-200 text-red-700 rounded-xl p-3.5 text-sm flex items-center gap-2">
      <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      Email yoki parol noto'g'ri. Qaytadan urinib ko'ring.
    </div>

    <form method="POST" action="/login" class="space-y-4">
      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
        <div class="relative">
          <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
          <input type="email" name="email" required autocomplete="email"
            class="w-full pl-10 pr-4 py-3 border border-slate-200 rounded-xl text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition text-sm"
            placeholder="email@example.com">
        </div>
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Parol</label>
        <div class="relative">
          <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
          <input type="password" id="pwd" name="password" required autocomplete="current-password"
            class="w-full pl-10 pr-12 py-3 border border-slate-200 rounded-xl text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition text-sm"
            placeholder="••••••••">
          <button type="button" onclick="togglePwd()" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition p-0.5">
            <svg id="eye" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit"
        class="w-full bg-emerald-500 hover:bg-emerald-600 active:bg-emerald-700 text-white font-semibold py-3 rounded-xl transition duration-150 shadow-sm text-sm mt-2">
        Kirish →
      </button>
    </form>

    <p class="text-center text-xs text-slate-400 mt-6">ALLMAX Fix Price © 2026</p>
  </div>
</div>

<script>
if (new URLSearchParams(location.search).get('err') === '1') {
  document.getElementById('err').classList.remove('hidden');
}
function togglePwd() {
  const i = document.getElementById('pwd');
  i.type = i.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
